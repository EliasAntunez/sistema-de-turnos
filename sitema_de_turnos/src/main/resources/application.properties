# Logging a archivo para depuración
logging.file.name=logs/app.log
# Deshabilitar la rotación automática de logs (evita crear archivos .gz)
#logging.logback.rollingpolicy.max-history=0
#logging.logback.rollingpolicy.file-name-pattern=
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
spring.application.name=sitema_de_turnos

# ===========================
# Perfil Activo
# ===========================
# Usar 'dev' en desarrollo local, 'prod' en producción
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===========================
# Configuración JPA/Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===========================
# Servidor
# ===========================
server.port=8080

# ===========================
# Configuración de Sesiones
# ===========================
# Tiempo de expiración de sesión (en segundos): 8 horas = 28800 segundos
server.servlet.session.timeout=28800s

# Cookies de sesión con configuración segura
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
# PRODUCCIÓN: Cambiar server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.path=/

# Cookie CSRF (local HTTP)
app.security.cookie.secure=false
app.security.cookie.same-site=Lax

# Orígenes permitidos para CORS (separados por comas). Ej: http://localhost:5173,https://mi-dominio.com
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# URL base del frontend (usada para construir links en emails)
# PRODUCCIÓN: Cambiar a la URL pública, ej: https://mi-dominio.com
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ===========================
# Configuración Email (Brevo API)
# ===========================
app.notification.email.enabled=true

# ===========================
# Configuración de Recordatorios
# ===========================
# Los valores específicos por entorno están en application-{profile}.properties

# Habilitar/deshabilitar scheduler de recordatorios
app.reminder.enabled=true

# Horas antes del turno para enviar recordatorio (límite superior de ventana)
# Valor por defecto si no se especifica en profile específico
app.reminder.hours-before=12

# Minutos mínimos antes del turno (límite inferior de ventana)
# Si un turno está más cerca que esto, no se envía recordatorio (ya es muy tarde)
app.reminder.min-minutes-before=30

# Número máximo de reintentos en caso de fallo
app.reminder.max-retries=3

# Delay en milisegundos entre reintentos (se aplica exponential backoff)
app.reminder.retry-delay-ms=2000

# Expresión cron para ejecutar el scheduler
# Valor por defecto: cada minuto (segundo 0)
# Formato: segundo minuto hora día mes díaSemana
app.reminder.cron=0 * * * * *

# ===========================
# Configuración de Notificaciones
# ===========================
# Los valores específicos por entorno están en application-{profile}.properties

# Días de retención de notificaciones leídas antes de limpieza automática
# El scheduler mensual elimina notificaciones leídas más antiguas que este valor
app.notifications.retention-days=90

# ===========================
# Configuración de Pagos (Fase 1)
# ===========================
# Ventana de gracia para turnos en estado PENDIENTE_PAGO (en minutos)
app.turnos.expiration.grace-minutes=1

# Expresión cron del motor de expiración de turnos
# Formato: segundo minuto hora día mes díaSemana
app.turnos.expiration.cron=0 * * * * * 
