<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turno expirado</title>
</head>
<body style="margin:0;padding:0;background:#f8fafc;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f8fafc;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;">
          <tr>
            <td style="padding:20px 24px;background:#fef3c7;border-bottom:1px solid #fde68a;">
              <h1 style="margin:0;font-size:20px;color:#92400e;">Tu turno expiró</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <p style="margin:0 0 12px 0;">Hola <strong th:text="${clienteNombre}">Cliente</strong>,</p>
              <p style="margin:0 0 12px 0;">Tu turno en <strong th:text="${empresaNombre}">Empresa</strong> para el servicio <strong th:text="${servicioNombre}">Servicio</strong> del <strong th:text="${fecha}">dd/MM/yyyy</strong> de <strong th:text="${horaInicio}">00:00</strong> a <strong th:text="${horaFin}">00:00</strong> fue cancelado.</p>
              <p style="margin:0 0 12px 0;">Tu turno ha sido cancelado porque ha expirado el tiempo límite para abonar la seña. Por favor, vuelve a reservar si aún deseas el servicio.</p>
              <p style="margin:20px 0 0 0;">
                <a th:href="${urlReserva}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:10px 16px;border-radius:6px;font-weight:600;">Volver a reservar</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
