# ===========================
# PERFIL DE DESARROLLO
# ===========================
# Este archivo NO debe usarse en producción
# Contiene credenciales de desarrollo local

# Base de Datos - Desarrollo Local
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sistema_de_turnos_2}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Forzamos UTC solo en lo vital para evitar errores de arranque
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

# Admin por defecto - Solo desarrollo
admin.default.email=${ADMIN_DEFAULT_EMAIL:admin@example.com}
admin.default.password=${ADMIN_DEFAULT_PASSWORD:}

# Logging más verboso en desarrollo
logging.level.org.springframework.security=DEBUG
logging.level.com.example.sitema_de_turnos=INFO
logging.level.org.hibernate.SQL=DEBUG

# CSRF Logging Filter solo en modo DEBUG cuando sea necesario
# logging.level.com.example.sitema_de_turnos.configuracion.CsrfLoggingFilter=DEBUG

app.cors.allowed-origins=http://localhost:5173

# ===========================
# Configuración de Recordatorios - DESARROLLO
# ===========================
# Valores agresivos para testing rápido

# Enviar recordatorios 6 horas antes (en lugar de 24h)
# Permite testear sin esperar un día completo
app.reminder.hours-before=6

# Minutos mínimos antes del turno - REDUCIDO para testing rápido
# Solo 5 minutos en dev permite testear fácilmente la ventana de exclusión
app.reminder.min-minutes-before=5

# Reintentos en caso de fallo
app.reminder.max-retries=3

# Delay entre reintentos (2 segundos)
app.reminder.retry-delay-ms=2000

# Ejecutar cada MINUTO para testing rápido
# Formato cron: segundo minuto hora día mes díaSemana
app.reminder.cron=0 * * * * *

# Logging detallado de notificaciones en desarrollo
logging.level.com.example.sitema_de_turnos.servicio.notificacion=DEBUG
logging.level.com.example.sitema_de_turnos.servicio.scheduler=DEBUG
