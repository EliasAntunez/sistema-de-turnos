# ===========================
# PERFIL DE PRODUCCIÓN
# ===========================
# Este archivo es una PLANTILLA
# En producción real, las credenciales deben venir de:
# - Variables de entorno del sistema
# - AWS Secrets Manager / Azure Key Vault
# - Kubernetes Secrets
# - Nunca hardcodeadas

# Base de Datos - DEBE configurarse mediante variables de entorno
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP: pool pequeño para bajo consumo de memoria
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# Puerto dinámico asignado por Railway
server.port=${PORT:8080}

# Tomcat embebido (MVP): reducir hilos y colas para ahorrar RAM
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=25
server.tomcat.max-connections=200

# Confiar en headers del reverse proxy (Railway)
server.forward-headers-strategy=framework

# Estrategia de esquema JPA/Hibernate en producción
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Optimización de arranque/footprint para contenedor con RAM limitada
spring.jmx.enabled=false
spring.main.lazy-initialization=true

# Forzamos UTC solo en lo vital para evitar errores de arranque
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

# Admin por defecto - DEBE configurarse mediante variables de entorno
admin.default.email=${ADMIN_DEFAULT_EMAIL}
admin.default.password=${ADMIN_DEFAULT_PASSWORD}

# Logging en producción (menos verboso)
logging.level.root=WARN
logging.level.org.springframework.security=WARN
logging.level.com.example.sitema_de_turnos=INFO
logging.level.org.hibernate=WARN

# Desactivar CSRF Logging Filter en producción
logging.level.com.example.sitema_de_turnos.configuracion.CsrfLoggingFilter=WARN

# Seguridad adicional en producción
spring.web.error.include-message=never
spring.web.error.include-stacktrace=never

# Cookies seguras - Producción (sobrescribe application.properties)
server.servlet.session.cookie.secure=true

# Cookie CSRF (producción HTTPS + cross-site)
app.security.cookie.secure=true
app.security.cookie.same-site=None

# ===========================
# Configuración de Recordatorios - PRODUCCIÓN
# ===========================
# Valores conservadores para ambiente real

# Zona horaria usada por todos los schedulers (@Scheduled)
app.scheduler.zone=${APP_TIMEZONE:America/Argentina/Buenos_Aires}

# Habilitar/deshabilitar scheduler de recordatorios
app.reminder.enabled=true

# Enviar recordatorios 24 horas antes del turno
app.reminder.hours-before=24

# Minutos mínimos antes del turno
# Si un turno está a menos de 30 minutos, no enviar (ya es muy tarde)
app.reminder.min-minutes-before=30

# Reintentos en caso de fallo
app.reminder.max-retries=3

# Delay entre reintentos (5 segundos en producción)
app.reminder.retry-delay-ms=5000

# Pausa entre envíos de emails para no saturar SMTP
app.reminder.throttle-delay-ms=1500

# Ejecutar cada MINUTO (segundo 0 de cada minuto)
# Formato cron: segundo minuto hora día mes díaSemana
# 0 * * * * * = "Al segundo 0 de CADA minuto" -> garantiza cubrir todas las ventanas 1h-2h
app.reminder.cron=0 * * * * *

# ===========================
# Configuración de Expiración de Turnos Pendientes de Pago - PRODUCCIÓN
# ===========================

# Minutos de gracia para completar seña/pago antes de expirar el turno
app.turnos.expiration.grace-minutes=15

# Ejecutar limpieza de turnos pendientes de pago cada 15 minutos
# Formato cron: segundo minuto hora día mes díaSemana
app.turnos.expiration.cron=0 */15 * * * *

# ===========================
# Configuración de Limpieza de Notificaciones - PRODUCCIÓN
# ===========================

# Días de retención de notificaciones leídas
app.notifications.retention-days=90

# Ejecutar mantenimiento pesado de limpieza el día 1 de cada mes a las 03:00
# Formato cron: segundo minuto hora día mes díaSemana
app.notifications.cleanup.cron=0 0 3 1 * *

# Logging de notificaciones en producción
logging.level.com.example.sitema_de_turnos.servicio.notificacion=INFO
logging.level.com.example.sitema_de_turnos.servicio.scheduler=INFO


app.cors.allowed-origins=https://sistema-de-turnos-225.pages.dev
