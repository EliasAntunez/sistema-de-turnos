server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache agresiva para assets con hash en el nombre (generados por Vite)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Proxy inverso hacia el backend Spring Boot
    # Todos los requests a /api/* se reenvían al contenedor "backend"
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;

        # Cabeceras necesarias para sesiones y WebSocket
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Forwarding de cookies de sesión (JSESSIONID)
        proxy_pass_header  Set-Cookie;

        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }

    # Proxy para WebSocket SockJS (/ws/*)
    location /ws/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # =========================================================================
    # HISTORY MODE — Vue Router usa createWebHistory()
    # Sin esta regla, al recargar /reservar/mi-empresa daría 404.
    # Cualquier ruta que no sea un archivo existente se sirve con index.html.
    # =========================================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ocultar versión de Nginx en cabeceras de error
    server_tokens off;
}
