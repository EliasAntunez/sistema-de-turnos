# =============================================================================
# docker-compose.yml — Sistema de Turnos
# Orquesta: PostgreSQL 15 · Spring Boot Backend · Vue/Nginx Frontend
#
# Uso:
#   1. Copiar .env.example a .env y completar las variables
#   2. docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # BASE DE DATOS — PostgreSQL 15
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: sistema_turnos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expuesto sólo para acceso desde herramientas locales (DBeaver, psql).
      # En producción con Swarm/K8s, eliminar este bloque.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend_net

  # ---------------------------------------------------------------------------
  # BACKEND — Spring Boot 4 / Java 21
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./sitema_de_turnos
      dockerfile: Dockerfile
    container_name: sistema_turnos_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod

      # Base de datos (referencia al servicio "db" dentro de la red Docker)
      DB_URL:      jdbc:postgresql://db:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # Administrador por defecto (creado al arrancar si no existe)
      ADMIN_DEFAULT_EMAIL:    ${ADMIN_DEFAULT_EMAIL}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}

      # CORS: el frontend está en el mismo host (Nginx en puerto 80)
      # Si publicas en un dominio real, cambia este valor en .env
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost}

      # URL pública del frontend (usada en links de email)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}

      # Gmail SMTP para recordatorios y notificaciones
      GMAIL_USERNAME:    ${GMAIL_USERNAME}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      EMAIL_FROM:        ${EMAIL_FROM}
      EMAIL_FROM_NAME:   ${EMAIL_FROM_NAME:-Sistema de Turnos}

      # JVM — opcional, puede sobreescribirse aquí si se necesita heap fijo
      # JAVA_OPTS: -Xms256m -Xmx512m
    ports:
      # Sólo expuesto para debug directo; en producción puede omitirse
      # ya que Nginx hace de proxy reverso.
      - "8080:8080"
    networks:
      - backend_net
      - frontend_net

  # ---------------------------------------------------------------------------
  # FRONTEND — Vue 3 + Vite ▸ Nginx 1.27
  # Actúa también como reverse proxy hacia /api/* y /ws/*
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sistema_turnos_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - frontend_net

# =============================================================================
# REDES
# backend_net: aislada, sólo db ↔ backend
# frontend_net: frontend ↔ backend (para el proxy /api/)
# =============================================================================
networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge

# =============================================================================
# VOLÚMENES
# =============================================================================
volumes:
  postgres_data:
    driver: local
